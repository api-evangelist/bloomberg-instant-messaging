- aid: bloomberg-instant-messaging:bloomberg-bchat
  name: Bloomberg B-Chat
  description: Bloomberg's enterprise communication platform extending the Bloomberg
    messaging network to broader enterprise connectivity, enabling compliant communication
    with financial counterparties outside the Bloomberg Terminal.
