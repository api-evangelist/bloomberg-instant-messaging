apis:
- aid: bloomberg-instant-messaging:bloomberg-ib-api
  name: Bloomberg IB Messaging API
  description: Programmatic access to Bloomberg's secure IB messaging network for
    sending and receiving messages within the Bloomberg Terminal ecosystem. Supports
    integration with trading and compliance systems for automated messaging workflows.
  humanURL: https://www.bloomberg.com/professional/product/bloomberg-messaging/
  baseURL: blpapi://localhost:8194
