aid: bloomberg-instant-messaging
name: Bloomberg Instant Messaging
description: Bloomberg Instant Messaging (IB) is a secure, compliant messaging platform
  embedded in the Bloomberg Terminal and accessible via Bloomberg Anywhere. It enables
  real-time communication between financial professionals globally, with message archiving,
  compliance monitoring, and integration capabilities. Bloomberg also provides B-Chat
  for broader enterprise messaging connectivity.
